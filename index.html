<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мандрівка Planner — Карпати</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets.react, { "runtime": "classic" }]
            ]
        });
    </script>

    <style>
        .leaflet-popup-content-wrapper { background-color: #0f172a !important; color: #f1f5f9 !important; border: 1px solid #334155 !important; border-radius: 0.75rem !important; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important; }
        .leaflet-popup-tip { background-color: #0f172a !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 9999px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-presets="react-classic">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            MapPin: () => <svg className="w-4 h-4 text-rose-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><circle cx="12" cy="10" r="3" /></svg>,
            Calendar: () => <svg className="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></svg>,
            Car: () => <svg className="w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M8.257 3.099c.765-.46 1.713-.34 2.321.324l3.358 3.663c.28.306.671.48 1.082.48h2.646c1.173 0 2.052.986 1.96 2.155L19.13 15.155A2.25 2.25 0 0116.89 17H7.11a2.25 2.25 0 01-2.24-1.845L4.37 9.845A2.22 2.22 0 016.33 7.56h1.2c.28 0 .546-.11.727-.301l3.358-3.663z" /><circle cx="7.5" cy="18.5" r="1.5" /><circle cx="16.5" cy="18.5" r="1.5" /></svg>,
            DollarSign: () => <svg className="w-4 h-4 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            Plus: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" /></svg>,
            Trash2: () => <svg className="w-4 h-4 text-rose-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v16M1 4h22M8 4h8" /></svg>,
            Settings: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"><circle cx="12" cy="12" r="3" /></path></svg>,
            Compass: () => <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>,
            ChevronUp: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M5 15l7-7 7 7" /></svg>,
            ChevronDown: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M19 9l-7 7-7-7" /></svg>,
            Edit3: () => <svg className="w-4 h-4 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>,
            Layers: () => <svg className="w-4 h-4 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>,
            X: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>,
            Download: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
            Upload: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>,
            Camera: () => <svg className="w-8 h-8 opacity-40 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><circle cx="12" cy="13" r="3" /></svg>
        };

        const INITIAL_TRIP_DATA = {
            title: "Мандрівка в Карпати",
            description: "Літня подорож: відпочинок, збір грибів, замки та чани.",
            startPoint: "Первомайськ",
            endPoint: "Пилипець",
            plannedDistance: 1460,
            carModel: "Tiguan III 2024",
            fuelConsumption: 6.0, 
            fuelPrice: 82.90, 
            travelersCount: 3,
            startDate: "2026-07-15",
            days: [
                {
                    id: "day-1",
                    title: "Трансфер та заселення",
                    activities: [
                        { id: "act-1", title: "Заселення у котедж", desc: "Прибуття в Пилипець.", cost: 4500, distance: 0, category: "stay", location: "Пилипець", coords: [[48.667, 23.34]], img: "" }
                    ]
                }
            ]
        };

        const CATEGORIES = {
            transport: { label: "Транспорт", color: "bg-blue-500", text: "text-blue-500", icon: Icons.Car },
            stay: { label: "Проживання", color: "bg-indigo-500", text: "text-indigo-500", icon: Icons.Layers },
            nature: { label: "Природа", color: "bg-emerald-500", text: "text-emerald-500", icon: Icons.Compass },
            sightseeing: { label: "Екскурсії", color: "bg-amber-500", text: "text-amber-500", icon: Icons.MapPin },
            food: { label: "Харчування", color: "bg-rose-500", text: "text-rose-500", icon: Icons.DollarSign }
        };

        const formatUkDate = (dateString, daysToAdd = 0) => {
            if (!dateString) return "";
            const date = new Date(dateString);
            date.setDate(date.getDate() + daysToAdd);
            const months = ["Січня", "Лютого", "Березня", "Квітня", "Травня", "Червня", "Липня", "Серпня", "Вересня", "Жовтня", "Листопада", "Грудня"];
            return `${date.getDate()} ${months[date.getMonth()]}`;
        };

        function App() {
            const [trip, setTrip] = useState(() => {
                const saved = localStorage.getItem('vlad_mandrivka_html_trip');
                return saved ? JSON.parse(saved) : INITIAL_TRIP_DATA;
            });

            const [activeDayId, setActiveDayId] = useState(trip.days[0]?.id || "");
            const [isEditSettings, setIsEditSettings] = useState(false);
            const [editingActivity, setEditingActivity] = useState(null);
            const [newActivityDayId, setNewActivityDayId] = useState(null);
            const [showNotification, setShowNotification] = useState("");

            const mapRef = useRef(null);
            const leafletMapInstance = useRef(null);
            const markersGroup = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('vlad_mandrivka_html_trip', JSON.stringify(trip));
            }, [trip]);

            useEffect(() => {
                if (!mapRef.current || !window.L) return;
                if (!leafletMapInstance.current) {
                    leafletMapInstance.current = window.L.map(mapRef.current).setView([48.667, 23.34], 8);
                    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(leafletMapInstance.current);
                    markersGroup.current = window.L.layerGroup().addTo(leafletMapInstance.current);
                }
                
                markersGroup.current.clearLayers();
                const bounds = [];
                
                trip.days.forEach(day => day.activities.forEach(act => {
                    let pts = act.coords;
                    // Backward compatibility: if it's a single array [lat, lng], wrap it
                    if (pts && pts.length === 2 && typeof pts[0] === 'number') {
                        pts = [pts];
                    }
                    
                    if (pts && pts.length > 0) {
                        const isCurrentDay = day.id === activeDayId;
                        const markerColor = isCurrentDay ? '#f43f5e' : '#3b82f6';
                        const customIcon = window.L.divIcon({ 
                            className: 'custom-div-icon', 
                            html: `<div style="background-color: ${markerColor}; width: 14px; height: 14px; border-radius: 50%; border: 2.5px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.4);"></div>`, 
                            iconSize: [14, 14], 
                            iconAnchor: [7, 7] 
                        });
                        
                        pts.forEach((pt, idx) => {
                            const marker = window.L.marker(pt, { icon: customIcon })
                                .bindPopup(`<strong class="text-xs">${act.title} ${pts.length > 1 ? `(Точка ${idx+1})` : ''}</strong><br/><span class="text-[10px] text-slate-400">${act.location || ''}</span>`);
                            markersGroup.current.addLayer(marker);
                            bounds.push(pt);
                        });

                        // Draw path if multiple points
                        if (pts.length > 1) {
                            const polyline = window.L.polyline(pts, { 
                                color: markerColor, 
                                weight: 3, 
                                dashArray: '5, 5',
                                opacity: 0.8
                            });
                            markersGroup.current.addLayer(polyline);
                        }
                    }
                }));

                if (bounds.length > 0) {
                    leafletMapInstance.current.fitBounds(bounds, { padding: [40, 40] });
                }
            }, [trip, activeDayId]);

            const calcActivitiesDistance = () => { let dist = 0; trip.days.forEach(day => day.activities.forEach(act => dist += Number(act.distance || 0))); return dist; };
            const calcTotalDistance = () => Number(trip.plannedDistance || 0) + calcActivitiesDistance();
            const calcFuelCost = () => Math.round((calcTotalDistance() / 100) * trip.fuelConsumption * trip.fuelPrice);
            const calcActivitiesCost = () => { let total = 0; trip.days.forEach(day => day.activities.forEach(act => total += Number(act.cost || 0))); return total; };
            const calcTotalBudget = () => calcFuelCost() + calcActivitiesCost();

            const triggerNotification = (text) => { setShowNotification(text); setTimeout(() => setShowNotification(""), 3000); };
            const updateSettings = (field, value) => setTrip(prev => ({ ...prev, [field]: value }));

            const handleExport = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(trip));
                const dlAnchorElem = document.createElement('a');
                dlAnchorElem.setAttribute("href", dataStr);
                dlAnchorElem.setAttribute("download", "mandrivka_plan.json");
                dlAnchorElem.click();
                triggerNotification("Файл плану завантажено!");
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedTrip = JSON.parse(event.target.result);
                        if (importedTrip && importedTrip.days) {
                            setTrip(importedTrip);
                            triggerNotification("План успішно імпортовано!");
                        }
                    } catch (err) {
                        triggerNotification("Помилка: невірний формат файлу.");
                    }
                };
                reader.readAsText(file);
            };

            const handleMoveActivity = (dayId, actIndex, direction) => {
                const updatedDays = trip.days.map(day => {
                    if (day.id !== dayId) return day;
                    const acts = [...day.activities];
                    if (direction === 'up' && actIndex > 0) [acts[actIndex], acts[actIndex - 1]] = [acts[actIndex - 1], acts[actIndex]];
                    else if (direction === 'down' && actIndex < acts.length - 1) [acts[actIndex], acts[actIndex + 1]] = [acts[actIndex + 1], acts[actIndex]];
                    return { ...day, activities: acts };
                });
                setTrip(prev => ({ ...prev, days: updatedDays }));
            };

            const handleDeleteActivity = (dayId, actId) => {
                const updatedDays = trip.days.map(day => { if (day.id !== dayId) return day; return { ...day, activities: day.activities.filter(a => a.id !== actId) }; });
                setTrip(prev => ({ ...prev, days: updatedDays }));
                triggerNotification("Локацію видалено!");
            };

            const handleSaveActivityModal = (formData) => {
                if (formData.id) {
                    const updatedDays = trip.days.map(day => ({ ...day, activities: day.activities.map(a => a.id === formData.id ? { ...a, ...formData } : a) }));
                    setTrip(prev => ({ ...prev, days: updatedDays }));
                    triggerNotification("Плани оновлено!");
                } else {
                    const newAct = { ...formData, id: 'act-' + Date.now() };
                    const updatedDays = trip.days.map(day => { if (day.id !== newActivityDayId) return day; return { ...day, activities: [...day.activities, newAct] }; });
                    setTrip(prev => ({ ...prev, days: updatedDays }));
                    triggerNotification("Додано нову локацію!");
                }
                setEditingActivity(null); setNewActivityDayId(null);
            };

            const handleAddDay = () => {
                const newDayId = 'day-' + Date.now();
                const newDay = { id: newDayId, title: `День ${trip.days.length + 1}: Нові дослідження`, activities: [] };
                setTrip(prev => ({ ...prev, days: [...prev.days, newDay] }));
                setActiveDayId(newDayId);
                triggerNotification("Додано новий день!");
            };

            const handleDeleteDay = (dayId) => {
                if (trip.days.length <= 1) return triggerNotification("Маршрут має містити хоча б один день!");
                const filtered = trip.days.filter(d => d.id !== dayId);
                setTrip(prev => ({ ...prev, days: filtered }));
                setActiveDayId(filtered[0].id);
            };

            const getCoordsStringForEdit = (coords) => {
                if (!coords) return '';
                if (typeof coords[0] === 'number') return coords.join(', '); 
                return coords.map(pt => pt.join(', ')).join('; ');
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="border-b border-slate-800 bg-slate-950 px-6 py-4 flex items-center justify-between sticky top-0 z-40 shadow-md">
                        <div className="flex items-center space-x-3">
                            <div className="p-2 bg-indigo-600 rounded-xl text-white"><Icons.Compass /></div>
                            <div>
                                <h1 className="text-lg md:text-xl font-bold bg-gradient-to-r from-indigo-400 to-emerald-400 bg-clip-text text-transparent">Мандрівка Planner</h1>
                            </div>
                        </div>

                        <div className="flex items-center space-x-2">
                            <input type="file" ref={fileInputRef} style={{display: 'none'}} accept=".json" onChange={handleImport} />
                            
                            <button onClick={() => fileInputRef.current.click()} className="flex items-center space-x-1.5 px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs transition">
                                <Icons.Upload /><span className="hidden sm:inline">Імпорт</span>
                            </button>
                            <button onClick={handleExport} className="flex items-center space-x-1.5 px-3 py-1.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs transition">
                                <Icons.Download /><span className="hidden sm:inline">Експорт</span>
                            </button>
                            <div className="w-px h-5 bg-slate-700 mx-1"></div>
                            <button onClick={() => setIsEditSettings(true)} className="flex items-center space-x-1.5 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg text-xs font-semibold transition">
                                <Icons.Settings /><span className="hidden sm:inline">Налаштування</span>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 grid grid-cols-1 xl:grid-cols-12 gap-6 p-4 md:p-6 max-w-[1600px] mx-auto w-full">
                        <section className="xl:col-span-4 space-y-6 flex flex-col">
                            <div className="bg-slate-950 border border-slate-800 rounded-2xl p-5 shadow-xl">
                                <input 
                                    type="text" 
                                    value={trip.title} 
                                    onChange={(e) => updateSettings('title', e.target.value)} 
                                    className="text-xl font-black text-white mt-0.5 bg-transparent border-b border-transparent hover:border-slate-800 focus:border-indigo-500 outline-none w-full"
                                />
                                <textarea
                                    value={trip.description || ""}
                                    onChange={(e) => updateSettings('description', e.target.value)}
                                    placeholder="Стислий опис вашої подорожі (мета, формат)..."
                                    className="w-full bg-transparent text-slate-400 text-xs mt-2 resize-none outline-none border-b border-transparent hover:border-slate-800 focus:border-indigo-500 custom-scrollbar"
                                    rows="2"
                                />
                                <div className="grid grid-cols-2 gap-3 text-xs mt-4">
                                    <div className="p-3 bg-slate-900 border border-slate-800 rounded-xl"><span className="text-slate-400 block text-[10px] mb-0.5">Всього на авто</span><strong className="text-white text-sm">{calcTotalDistance()} км</strong></div>
                                    <div className="p-3 bg-slate-900 border border-slate-800 rounded-xl"><span className="text-slate-400 block text-[10px] mb-0.5">Бюджет ДП (дизель)</span><strong className="text-white text-sm">{calcFuelCost().toLocaleString()} ₴</strong></div>
                                    <div className="p-3 bg-slate-900 border border-slate-800 rounded-xl"><span className="text-slate-400 block text-[10px] mb-0.5">Розваги & Житло</span><strong className="text-white text-sm">{calcActivitiesCost().toLocaleString()} ₴</strong></div>
                                    <div className="p-3 bg-indigo-950/40 border border-indigo-900/50 rounded-xl"><span className="text-indigo-300 block text-[10px] mb-0.5">Загальний бюджет</span><strong className="text-indigo-200 text-sm">{calcTotalBudget().toLocaleString()} ₴</strong></div>
                                </div>
                            </div>
                            <div className="bg-slate-950 border border-slate-800 rounded-2xl p-4 flex-1 min-h-[300px] flex flex-col shadow-xl">
                                <span className="text-xs font-bold text-slate-400 mb-2 block">Інтерактивний трекер</span>
                                <div ref={mapRef} className="flex-1 bg-slate-900 rounded-xl overflow-hidden border border-slate-800 relative" />
                            </div>
                        </section>

                        <section className="xl:col-span-8 flex flex-col space-y-6">
                            <div className="bg-slate-950 border border-slate-800 rounded-2xl p-4 shadow-xl">
                                <div className="flex items-center justify-between mb-3">
                                    <span className="text-xs font-bold text-slate-400">Календар поїздки</span>
                                    <button onClick={handleAddDay} className="flex items-center space-x-1 text-xs px-2.5 py-1 bg-emerald-600 hover:bg-emerald-500 rounded text-white font-medium transition"><Icons.Plus /><span>Додати день</span></button>
                                </div>
                                <div className="flex items-center space-x-2 overflow-x-auto pb-1 custom-scrollbar">
                                    {trip.days.map((day, idx) => {
                                        const isActive = day.id === activeDayId;
                                        return (
                                            <div key={day.id} className="relative flex-shrink-0 group">
                                                <button onClick={() => setActiveDayId(day.id)} className={`px-4 py-2 rounded-xl text-xs font-semibold flex flex-col items-start min-w-[110px] transition ${isActive ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-900 text-slate-400 border border-slate-800'}`}>
                                                    <span className="opacity-75 text-[10px]">День {idx + 1}</span>
                                                    <span className="font-bold mt-0.5 whitespace-nowrap">{formatUkDate(trip.startDate, idx)}</span>
                                                </button>
                                                {trip.days.length > 1 && <button onClick={(e) => { e.stopPropagation(); handleDeleteDay(day.id); }} className="absolute -top-1 -right-1 opacity-0 group-hover:opacity-100 bg-rose-600 hover:bg-rose-500 text-white p-0.5 rounded-full z-10"><Icons.X /></button>}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {trip.days.map((day, idx) => {
                                if (day.id !== activeDayId) return null;
                                return (
                                    <div key={day.id} className="bg-slate-950 border border-slate-800 rounded-2xl p-6 flex-1 flex flex-col space-y-5 shadow-xl">
                                        <div className="flex items-center justify-between border-b border-slate-800 pb-3">
                                            <div>
                                                <input type="text" value={day.title} onChange={(e) => updateSettings('days', trip.days.map(d => d.id === day.id ? { ...d, title: e.target.value } : d))} className="bg-transparent text-white text-base md:text-lg font-bold border-b border-transparent hover:border-slate-800 focus:border-indigo-500 outline-none w-full" />
                                                <span className="text-[11px] text-indigo-400 font-semibold block mt-0.5">Дата: {formatUkDate(trip.startDate, idx)}</span>
                                            </div>
                                            <button onClick={() => { setNewActivityDayId(day.id); setEditingActivity({ title: "", desc: "", cost: 0, distance: 0, category: "sightseeing", location: "", coords: [[48.667, 23.34]], img: "" }); }} className="flex items-center space-x-1 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 rounded text-xs font-bold text-white"><Icons.Plus /><span>Локація</span></button>
                                        </div>

                                        <div className="flex-1 space-y-4">
                                            {day.activities.length === 0 ? (
                                                <div className="py-12 text-center text-slate-500 border-2 border-dashed border-slate-800 rounded-2xl"><p className="text-sm font-semibold">Немає запланованих зупинок</p></div>
                                            ) : (
                                                day.activities.map((act, index) => {
                                                    const CatInfo = CATEGORIES[act.category] || CATEGORIES.sightseeing;
                                                    return (
                                                        <div key={act.id} className="group flex flex-col md:flex-row bg-slate-900 border border-slate-800 rounded-xl overflow-hidden hover:border-slate-700 transition">
                                                            <div className="w-full md:w-40 h-32 md:h-auto min-h-[8rem] bg-slate-800 flex-shrink-0 relative overflow-hidden flex items-center justify-center border-b md:border-b-0 md:border-r border-slate-700/50">
                                                                {act.img ? (
                                                                    <img 
                                                                        src={act.img} 
                                                                        alt="" 
                                                                        className="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition duration-300"
                                                                        onError={(e) => { e.target.style.display='none'; e.target.nextElementSibling.style.display='block'; }}
                                                                    />
                                                                ) : null}
                                                                <div className={act.img ? "hidden text-slate-500" : "text-slate-500"}>
                                                                    <Icons.Camera />
                                                                </div>
                                                            </div>
                                                            <div className="flex-1 p-4 flex flex-col justify-between space-y-2">
                                                                <div>
                                                                    <div className="flex items-center space-x-2">
                                                                        <span className={`flex items-center space-x-1 text-[9px] font-bold uppercase px-2 py-0.5 rounded text-slate-900 ${CatInfo.color}`}><CatInfo.icon className="w-2.5 h-2.5" /><span>{CatInfo.label}</span></span>
                                                                        {act.location && <span className="text-[10px] text-slate-400 flex items-center space-x-0.5"><Icons.MapPin /><span>{act.location}</span></span>}
                                                                        {act.distance > 0 && <span className="text-[10px] text-slate-400 flex items-center space-x-0.5"><Icons.Car /><span>{act.distance} км</span></span>}
                                                                    </div>
                                                                    <h4 className="text-sm font-bold text-white mt-1">{act.title}</h4>
                                                                    <p className="text-[11px] text-slate-400 mt-0.5">{act.desc}</p>
                                                                </div>
                                                                <div className="flex items-center justify-between pt-2 border-t border-slate-800/60">
                                                                    <span className="text-emerald-400 font-bold text-xs">{act.cost > 0 ? `${act.cost.toLocaleString()} ₴` : "Безкоштовно"}</span>
                                                                    <div className="flex space-x-1">
                                                                        <button onClick={() => handleMoveActivity(day.id, index, 'up')} disabled={index === 0} className="p-1 text-slate-500 hover:text-white disabled:opacity-20"><Icons.ChevronUp /></button>
                                                                        <button onClick={() => handleMoveActivity(day.id, index, 'down')} disabled={index === day.activities.length - 1} className="p-1 text-slate-500 hover:text-white disabled:opacity-20"><Icons.ChevronDown /></button>
                                                                        <button onClick={() => setEditingActivity(act)} className="p-1"><Icons.Edit3 /></button>
                                                                        <button onClick={() => handleDeleteActivity(day.id, act.id)} className="p-1"><Icons.Trash2 /></button>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </section>
                    </main>

                    {}
                    {isEditSettings && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-950 border border-slate-800 w-full max-w-sm rounded-2xl p-5 space-y-4">
                                <div className="flex justify-between items-center border-b border-slate-800 pb-2 text-sm font-bold text-white"><span>Налаштування Маршруту</span><button onClick={() => setIsEditSettings(false)}><Icons.X /></button></div>
                                <div className="text-xs space-y-3">
                                    <div><label className="block text-slate-400 mb-1">Дата виїзду</label><input type="date" value={trip.startDate} onChange={(e) => updateSettings('startDate', e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded p-2 text-white" /></div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div><label className="block text-slate-400 mb-1">Розхід (л/100км)</label><input type="number" step="0.1" value={trip.fuelConsumption} onChange={(e) => updateSettings('fuelConsumption', Number(e.target.value))} className="w-full bg-slate-900 border border-slate-800 rounded p-2 text-white" /></div>
                                        <div><label className="block text-slate-400 mb-1">Ціна ДП, ₴</label><input type="number" step="0.1" value={trip.fuelPrice} onChange={(e) => updateSettings('fuelPrice', Number(e.target.value))} className="w-full bg-slate-900 border border-slate-800 rounded p-2 text-white" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div><label className="block text-slate-400 mb-1">Базовий пробіг, км</label><input type="number" value={trip.plannedDistance} onChange={(e) => updateSettings('plannedDistance', Number(e.target.value))} className="w-full bg-slate-900 border border-slate-800 rounded p-2 text-white" /></div>
                                        <div><label className="block text-slate-400 mb-1">Кількість людей</label><input type="number" value={trip.travelersCount} onChange={(e) => updateSettings('travelersCount', Number(e.target.value))} className="w-full bg-slate-900 border border-slate-800 rounded p-2 text-white" /></div>
                                    </div>
                                </div>
                                <button onClick={() => setIsEditSettings(false)} className="w-full bg-indigo-600 text-white font-bold py-2 rounded text-xs">Зберегти</button>
                            </div>
                        </div>
                    )}

                    {editingActivity && (
                        <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-950 border border-slate-800 w-full max-w-sm rounded-2xl p-5 text-xs space-y-3 overflow-y-auto max-h-[90vh] custom-scrollbar">
                                <span className="font-bold text-white block text-sm">Параметри локації</span>
                                <form onSubmit={(e) => {
                                    e.preventDefault(); 
                                    const fd = new FormData(e.target);
                                    const coordsInput = fd.get('coords');
                                    let parsedCoords = [[48.667, 23.34]];
                                    
                                    if (coordsInput) {
                                        const points = coordsInput.split(';');
                                        parsedCoords = points.map(pt => {
                                            const parts = pt.split(',');
                                            if (parts.length >= 2) {
                                                const lat = Number(parts[0].trim());
                                                const lng = Number(parts[1].trim());
                                                if (!isNaN(lat) && !isNaN(lng)) return [lat, lng];
                                            }
                                            return null;
                                        }).filter(Boolean);
                                        if (parsedCoords.length === 0) parsedCoords = [[48.667, 23.34]];
                                    }

                                    handleSaveActivityModal({ 
                                        id: editingActivity.id, 
                                        title: fd.get('title'), 
                                        desc: fd.get('desc'), 
                                        cost: Number(fd.get('cost')), 
                                        distance: Number(fd.get('distance')), 
                                        category: fd.get('category'), 
                                        location: fd.get('location'), 
                                        img: fd.get('img') || "", 
                                        coords: parsedCoords 
                                    });
                                }} className="space-y-3">
                                    <div><label className="block text-slate-400 mb-1">Назва локації *</label><input type="text" name="title" required defaultValue={editingActivity.title} className="w-full bg-slate-900 border border-slate-800 rounded p-2 text-white" /></div>
                                    <div><label className="block text-slate-400 mb-1">Адреса</label><input type="text" name="location" defaultValue={editingActivity.location} className="w-full bg-slate-900 border border-slate-800 rounded p-2 text-white" /></div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div><label className="block text-slate-400 mb-1">Вартість, ₴ *</label><input type="number" name="cost" required defaultValue={editingActivity.cost} className="w-full bg-slate-900 border border-slate-800 rounded p-2 text-white" /></div>
                                        <div><label className="block text-slate-400 mb-1">Дистанція, км</label><input type="number" name="distance" defaultValue={editingActivity.distance || 0} className="w-full bg-slate-900 border border-slate-800 rounded p-2 text-white" /></div>
                                    </div>
                                    <div><label className="block text-slate-400 mb-1">Категорія</label><select name="category" defaultValue={editingActivity.category} className="w-full bg-slate-900 border border-slate-800 rounded p-2 text-white">{Object.entries(CATEGORIES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></div>
                                    <div><label className="block text-slate-400 mb-1">URL Картинки</label><input type="url" name="img" defaultValue={editingActivity.img} placeholder="https://..." className="w-full bg-slate-900 border border-slate-800 rounded p-2 text-white" /></div>
                                    <div>
                                        <label className="block text-slate-400 mb-1">Координати (розділяти через ';')</label>
                                        <input type="text" name="coords" defaultValue={getCoordsStringForEdit(editingActivity.coords)} placeholder="48.442, 22.701; 48.525, 22.874" className="w-full bg-slate-900 border border-slate-800 rounded p-2 text-white" />
                                    </div>
                                    <div><label className="block text-slate-400 mb-1">Деталі</label><textarea name="desc" rows="2" defaultValue={editingActivity.desc} className="w-full bg-slate-900 border border-slate-800 rounded p-2 text-white resize-none" /></div>
                                    <div className="flex justify-end space-x-2 pt-2"><button type="button" onClick={() => setEditingActivity(null)} className="px-3 py-1.5 border border-slate-800 rounded text-slate-400">Скасувати</button><button type="submit" className="px-4 py-1.5 bg-indigo-600 text-white rounded font-bold">Зберегти</button></div>
                                </form>
                            </div>
                        </div>
                    )}

                    {showNotification && <div className="fixed bottom-6 right-6 bg-indigo-600 text-white px-4 py-2.5 rounded-xl text-xs font-bold z-50">{showNotification}</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
